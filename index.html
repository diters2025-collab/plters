<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLTERS - 스마트한 학습 습관의 시작</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;800&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF8A8A;
            --bg: #FFF9F9;
            --text: #2D3436;
            --shadow: rgba(255, 138, 138, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #FFF9F9 0%, #FFF0F0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px var(--shadow);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .icon-box:hover { transform: scale(1.05); }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #FF6B6B, #FF8A8A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 16px;
            color: #636E72;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .status {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: rgba(255, 138, 138, 0.1);
            color: var(--primary);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .loading {
            width: 16px;
            height: 16px;
            border: 2px solid var(--primary);
            border-top-color: transparent;
            border-radius: 50%;
            margin-right: 10px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #B2BEC3;
        }
    </style>
    <script>
        function redirect() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const iosUrl = "https://apps.apple.com/us/app/plters-%ED%94%8C%ED%84%B0%EC%8A%A4-%EC%8A%A4%ED%84%B0%EB%94%94-%ED%94%8C%EB%9E%98%EB%84%88/id6759158123";
            const androidUrl = "https://play.google.com/store/apps/details?id=com.plters.planner"; // 여기에 나중에 출시된 주소 입력

            setTimeout(() => {
                if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                    window.location.href = iosUrl;
                } else if (/android/i.test(userAgent)) {
                    // 안드로이드 주소가 아직 준비 안 된 경우 알림 처리 가능
                    window.location.href = androidUrl; 
                } else {
                    window.location.href = iosUrl;
                }
            }, 2000); // 2초 뒤 자동 이동
        }
    </script>
</head>
<body onload="redirect()">
    <div class="container">
        <div class="icon-box">
            <!-- 깃허브에 올릴 때는 plters_icon.png 파일도 같은 폴더에 있어야 합니다 -->
            <img src="plters_icon.png" alt="PLTERS Logo">
        </div>
        <h1>PLTERS</h1>
        <p>스마트한 학습 습관의 시작,<br>플터스가 당신의 목표를 응원합니다.</p>
        
        <div class="status">
            <div class="loading"></div>
            앱 스토어로 안전하게 연결 중...
        </div>

        <div class="footer">
            &copy; 2026 PLTERS Team. All rights reserved.
        </div>
    </div>
</body>
</html>
